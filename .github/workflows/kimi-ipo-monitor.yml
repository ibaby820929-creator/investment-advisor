name: 🔍 Kimi上市动态监控

on:
  schedule:
    # 早上9点、下午3点、晚上9点（北京时间）
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'

  # 手动触发，方便测试
  workflow_dispatch:

jobs:
  kimi-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📦 拉取代码
        uses: actions/checkout@v4

      - name: ⚙️ 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 运行Kimi上市监控
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node kimi-ipo-monitor.js

      - name: 💾 提交状态更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/kimi-ipo-state.json || true
          git diff --staged --quiet || git commit -m "📊 更新Kimi监控状态 $(date '+%Y-%m-%d %H:%M')"
          git push || true
